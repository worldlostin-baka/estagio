<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Horas</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --table-hover: #f9fafb;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-hover: #a5b4fc;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --success: #34d399;
            --danger: #f87171;
            --border: #334155;
            --input-bg: #0f172a;
            --table-hover: #334155;
            --shadow: rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container { max-width: 1100px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 { color: var(--primary); font-size: clamp(1.5rem, 4vw, 2rem); }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: var(--primary); color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background-color 0.3s;
        }
        .card h3 {
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .card .value {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--text);
        }

        .progress-container {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background-color 0.3s;
        }
        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background-color 0.3s;
        }
        .section h2 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            align-items: end;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--input-bg);
            color: var(--text);
            transition: border 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        [data-theme="dark"] .btn-danger:hover { background: #ef4444; }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 1rem;
            border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th { background: var(--bg); color: var(--text-light); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: var(--table-hover); }
        td button { width: auto; padding: 0.4rem 0.75rem; font-size: 0.8rem; }

        .empty-state {
            text-align: center;
            color: var(--text-light);
            padding: 2rem 1rem;
        }

        .preview-box {
            background: var(--bg);
            border: 1px dashed var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .preview-box strong { color: var(--primary); font-size: 1.1rem; }

        @media (max-width: 600px) {
            body { padding: 0.75rem; }
            .section { padding: 1rem; }
            .card { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            .form-group.full-width { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>⏱️ Controle de Horas</h1>
            <button class="theme-toggle" id="theme-toggle" title="Alternar tema">🌙</button>
        </div>

        <!-- Cards de Estatísticas -->
        <div class="grid">
            <div class="card">
                <h3>Horas Trabalhadas</h3>
                <div class="value" id="stat-worked">0.00h</div>
            </div>
            <div class="card">
                <h3>Horas Restantes</h3>
                <div class="value" id="stat-remaining">0.00h</div>
            </div>
            <div class="card">
                <h3>Meta Atual</h3>
                <div class="value" id="stat-goal">420.00h</div>
            </div>
        </div>

        <!-- Barra de Progresso -->
        <div class="progress-container">
            <h3>Progresso Geral</h3>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <p style="text-align: right; margin-top: 0.5rem; color: var(--text-light);" id="progress-text">0%</p>
        </div>

        <!-- Configurações de Meta -->
        <div class="section">
            <h2>🎯 Configurar Meta</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nova Meta de Horas</label>
                    <input type="number" id="input-goal" step="0.1" min="0" placeholder="Ex: 420">
                </div>
                <button class="btn" onclick="updateGoal()">Atualizar Meta</button>
            </div>
        </div>

        <!-- Registrar Horas -->
        <div class="section">
            <h2>📝 Registrar Jornada</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="input-date" required>
                </div>
                <div class="form-group">
                    <label>Hora de Entrada</label>
                    <input type="time" id="input-start" required>
                </div>
                <div class="form-group">
                    <label>Hora de Saída</label>
                    <input type="time" id="input-end" required>
                </div>
                <div class="form-group">
                    <label>Pausa</label>
                    <select id="input-break" onchange="toggleCustomBreak()">
                        <option value="0">Sem pausa</option>
                        <option value="30">30 minutos</option>
                        <option value="60" selected>1 hora</option>
                        <option value="90">1 hora e 30 minutos</option>
                        <option value="120">2 horas</option>
                        <option value="custom">Personalizado...</option>
                    </select>
                </div>
                <div class="form-group" id="custom-break-group" style="display: none;">
                    <label>Pausa (minutos)</label>
                    <input type="number" id="input-custom-break" min="0" step="1" placeholder="Ex: 45">
                </div>
                <div class="form-group full-width">
                    <label>Descrição (Opcional)</label>
                    <input type="text" id="input-desc" placeholder="Ex: Projeto X, Reunião com cliente...">
                </div>
                <div class="form-group full-width">
                    <div class="preview-box" id="preview-box">
                        Preencha os horários para ver o total calculado
                    </div>
                </div>
                <button class="btn full-width" onclick="addHours()">Adicionar Jornada</button>
            </div>
        </div>

        <!-- Histórico -->
        <div class="section">
            <h2>📊 Histórico de Apontamentos</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Entrada</th>
                            <th>Saída</th>
                            <th>Pausa</th>
                            <th>Total</th>
                            <th>Descrição</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- TEMA (DARK MODE) ---
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            applyTheme(current === 'light' ? 'dark' : 'light');
        });
        // Tema inicial
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        // --- INICIALIZAÇÃO ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('input-date').valueAsDate = new Date();
            renderDashboard();
            updatePreview();

            // Atualizar preview ao mudar os campos
            ['input-start', 'input-end', 'input-break', 'input-custom-break'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
                document.getElementById(id).addEventListener('change', updatePreview);
            });
        });

        // --- PAUSA PERSONALIZADA ---
        function toggleCustomBreak() {
            const select = document.getElementById('input-break');
            const group = document.getElementById('custom-break-group');
            group.style.display = select.value === 'custom' ? 'block' : 'none';
        }

        function getBreakMinutes() {
            const select = document.getElementById('input-break');
            if (select.value === 'custom') {
                return parseFloat(document.getElementById('input-custom-break').value) || 0;
            }
            return parseFloat(select.value);
        }

        function formatBreak(minutes) {
            if (minutes === 0) return 'Sem pausa';
            if (minutes < 60) return `${minutes}min`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h${m.toString().padStart(2,'0')}` : `${h}h`;
        }

        // --- CÁLCULO DE HORAS ---
        function calculateHours(start, end, breakMinutes) {
            if (!start || !end) return null;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            let startMin = sh * 60 + sm;
            let endMin = eh * 60 + em;

            // Se saída for antes da entrada, assumimos que virou o dia
            if (endMin <= startMin) endMin += 24 * 60;

            const workedMin = endMin - startMin - breakMinutes;
            if (workedMin <= 0) return null;
            return workedMin / 60;
        }

        function formatHours(hours) {
            if (hours === null || hours === undefined) return '-';
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (m === 0) return `${h}h`;
            return `${h}h${m.toString().padStart(2,'0')}`;
        }

        // --- PREVIEW EM TEMPO REAL ---
        function updatePreview() {
            const start = document.getElementById('input-start').value;
            const end = document.getElementById('input-end').value;
            const breakMin = getBreakMinutes();
            const box = document.getElementById('preview-box');

            const hours = calculateHours(start, end, breakMin);
            if (hours === null) {
                box.innerHTML = 'Preencha os horários para ver o total calculado';
            } else {
                box.innerHTML = `Total a ser registrado: <strong>${formatHours(hours)}</strong> (${hours.toFixed(2)}h)`;
            }
        }

        // --- DADOS ---
        function getData() {
            return JSON.parse(localStorage.getItem('horas_data')) || { goal: 420, logs: [] };
        }
        function saveData(data) {
            localStorage.setItem('horas_data', JSON.stringify(data));
        }

        // --- DASHBOARD ---
        function renderDashboard() {
            const data = getData();
            const totalWorked = data.logs.reduce((sum, log) => sum + parseFloat(log.hours), 0);
            const remaining = Math.max(0, data.goal - totalWorked);
            const progress = data.goal > 0 ? Math.min(100, (totalWorked / data.goal) * 100) : 0;

            document.getElementById('stat-worked').innerText = totalWorked.toFixed(2) + 'h';
            document.getElementById('stat-remaining').innerText = remaining.toFixed(2) + 'h';
            document.getElementById('stat-goal').innerText = data.goal.toFixed(2) + 'h';
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').innerText = progress.toFixed(1) + '%';
            document.getElementById('input-goal').value = data.goal;

            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';

            const sortedLogs = [...data.logs].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (sortedLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Nenhum registro encontrado. Comece adicionando sua primeira jornada!</td></tr>';
            } else {
                sortedLogs.forEach((log, index) => {
                    const tr = document.createElement('tr');
                    const dateFormatted = new Date(log.date + 'T00:00:00').toLocaleDateString('pt-BR');
                    tr.innerHTML = `
                        <td>${dateFormatted}</td>
                        <td>${log.start || '-'}</td>
                        <td>${log.end || '-'}</td>
                        <td>${formatBreak(log.breakMin || 0)}</td>
                        <td><strong>${formatHours(log.hours)}</strong></td>
                        <td>${log.desc || '-'}</td>
                        <td><button class="btn btn-danger" onclick="deleteLog(${index})">Excluir</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function updateGoal() {
            const newGoal = parseFloat(document.getElementById('input-goal').value);
            if (isNaN(newGoal) || newGoal < 0) {
                alert('Por favor, insira um valor válido para a meta.');
                return;
            }
            const data = getData();
            data.goal = newGoal;
            saveData(data);
            renderDashboard();
            alert('Meta atualizada com sucesso!');
        }

        function addHours() {
            const date = document.getElementById('input-date').value;
            const start = document.getElementById('input-start').value;
            const end = document.getElementById('input-end').value;
            const breakMin = getBreakMinutes();
            const desc = document.getElementById('input-desc').value.trim();

            if (!date || !start || !end) {
                alert('Por favor, preencha data, hora de entrada e hora de saída.');
                return;
            }
            if (breakMin < 0) {
                alert('O tempo de pausa não pode ser negativo.');
                return;
            }

            const hours = calculateHours(start, end, breakMin);
            if (hours === null) {
                alert('Horário inválido! Verifique se a pausa não é maior que o período trabalhado.');
                return;
            }

            const data = getData();
            data.logs.push({ hours, date, start, end, breakMin, desc });
            saveData(data);

            // Limpar campos (exceto data e pausa)
            document.getElementById('input-start').value = '';
            document.getElementById('input-end').value = '';
            document.getElementById('input-desc').value = '';
            updatePreview();
            renderDashboard();

            alert(`Jornada registrada: ${formatHours(hours)} trabalhadas!`);
        }

        function deleteLog(sortedIndex) {
            if (!confirm('Tem certeza que deseja excluir este registro?')) return;
            const data = getData();
            const sortedLogs = [...data.logs].sort((a, b) => new Date(b.date) - new Date(a.date));
            const logToDelete = sortedLogs[sortedIndex];
            const originalIndex = data.logs.findIndex(l =>
                l.date === logToDelete.date &&
                l.hours === logToDelete.hours &&
                l.start === logToDelete.start &&
                l.end === logToDelete.end
            );
            if (originalIndex !== -1) {
                data.logs.splice(originalIndex, 1);
                saveData(data);
                renderDashboard();
            }
        }
    </script>
</body>
</html>
